# Fix NVIDIA multi-GPU ghost/stuck cursor (Hyprland #12223): no_hardware_cursors
# auto-defaults to TRUE on multi-GPU NVIDIA, which leaves a stale HW-cursor plane
# (the ghost). Forcing it explicitly to FALSE fixes it at the source — both docked
# and undocked, no modeset/re-toggle workaround needed. Cursor stays visible.
# Sourced last (update-safe user dir). Revert: restore a hypr-user.conf.bak*.
cursor {
    no_hardware_cursors = false
}

# Display-mode switching (calls ~/.local/bin/display-mode; monitor names eDP-1 / HDMI-A-1).
# Revert: delete these four bind lines (or restore a hypr-user.conf.bak*).
bind = Super+Alt, 1, exec, display-mode laptop    # laptop panel only
bind = Super+Alt, 2, exec, display-mode external  # external monitor only (laptop off)
bind = Super+Alt, 3, exec, display-mode extend    # both, extended (laptop left, external right)
bind = Super+Alt, 4, exec, display-mode mirror    # mirror laptop onto external

# Per-monitor scale (update-safe; sourced after monitors/default.conf so these win).
# Revert: delete these two monitor lines (or restore a hypr-user.conf.bak*).
monitor=eDP-1,1920x1080@60,1920x0,1.25
monitor=HDMI-A-1,preferred,0x0,1

# --- Send window directly to the other monitor ---
bind = Super+Control, left, movewindow, mon:l
bind = Super+Control, right, movewindow, mon:r
