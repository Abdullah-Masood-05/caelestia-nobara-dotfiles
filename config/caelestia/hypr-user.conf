# Fix NVIDIA multi-GPU ghost/stuck cursor (Hyprland #12223): no_hardware_cursors
# auto-defaults to TRUE on multi-GPU NVIDIA, which leaves a stale HW-cursor plane
# (the ghost). Forcing it explicitly to FALSE fixes it at the source — both docked
# and undocked, no modeset/re-toggle workaround needed. Cursor stays visible.
# Sourced last (update-safe user dir). Revert: restore a hypr-user.conf.bak*.
cursor {
    no_hardware_cursors = false
}

# --- Neutralize dead / colliding frozen-repo binds (keybinds.conf untouched) ---
# Without these unbinds the new binds would DOUBLE-FIRE alongside the repo ones.
unbind = Super, C          # dead: $editor=codium not installed -> repurposed for Zed below
unbind = Super, B          # dead: repo firefox + zen-flatpak (neither installed) -> repurposed for Brave below
unbind = Super+Shift, L    # was 'systemctl suspend-then-hibernate' (hibernate white-screens on NVIDIA)
unbind = Ctrl+Super, S     # dead: flameshot not installed (Caelestia screenshot is Super+Shift+S)

# --- App launch shortcuts (free / repurposed keys) ---
bind = Super, C, exec, app2unit -- zed                                            # Zed editor (was dead codium)
bind = Super, O, exec, app2unit -- obs                                            # OBS
bind = Super, B, exec, app2unit -- brave-browser --password-store=kwallet6        # Brave (KWallet -> logins persist)
bind = Super+Shift, D, exec, app2unit -- dolphin                                  # Dolphin file manager

# --- Safer suspend (replaces removed suspend-then-hibernate) ---
bind = Super+Shift, L, exec, systemctl suspend

# --- Display-mode switching: migrated Super+Alt+1-4 -> Super+Shift+1-4 ---
# (frees Super+Alt+1-4 back to Caelestia's move-window-to-workspace).
# Calls ~/.local/bin/display-mode; monitor names eDP-1 / HDMI-A-1.
bind = Super+Shift, 1, exec, display-mode laptop    # laptop panel only
bind = Super+Shift, 2, exec, display-mode external  # external monitor only (laptop off)
bind = Super+Shift, 3, exec, display-mode extend    # both, extended (laptop left, external right)
bind = Super+Shift, 4, exec, display-mode mirror    # mirror laptop onto external

# --- Per-monitor scale (update-safe; sourced after monitors/default.conf so these win). ---
monitor=eDP-1,1920x1080@60,1920x0,1.25
monitor=HDMI-A-1,preferred,0x0,1

# --- Send focused window to the other monitor. Uses Super+Alt+arrows: free, and
#     fits this config's move-window family ($kbMoveWinToWs=Super+Alt). Avoids both
#     Super+Ctrl arrows (prev/next workspace) AND Super+Shift+Ctrl arrows
#     (move-to-workspace -1/+1). right = internal eDP-1, left = external HDMI-A-1. ---
bind = Super+Alt, right, exec, hyprctl dispatch movewindow mon:eDP-1
bind = Super+Alt, left,  exec, hyprctl dispatch movewindow mon:HDMI-A-1

# --- WhatsApp Web PWA -> communication special workspace (Super+D toggles it).
#     Unique Brave PWA class (distinct from plain brave-browser). ---
windowrule = workspace special:communication, class:brave-hnpfjngllnobngcgfapefoaidbinmjnm-Profile_1

# --- Strawberry (local music player) -> music special workspace (Super+M widget).
#     repo rules.conf only covers feishin|Spotify|Supersonic; Strawberry's class differs. ---
windowrule = workspace special:music, class:org.strawberrymusicplayer.strawberry
